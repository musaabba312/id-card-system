<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Card System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <div class="card">

        <div class="header">
            <h2>Community ID Card</h2>
        </div>

        <div class="content">
            <div class="profile">
                <img id="photo" src="https://via.placeholder.com/120" alt="Profile Photo">

                <div class="info">
                    <p><strong>Name:</strong> <span id="name">Full Name</span></p>
                    <p><strong>ID No:</strong> <span id="id">000001</span></p>
                    <p><strong>Position:</strong> <span id="position">Member</span></p>
                    <p><strong>Phone:</strong> <span id="phone">08000000000</span></p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Community ID Card System</p>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
